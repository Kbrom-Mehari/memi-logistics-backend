spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 900000 # 15 minutes for security in prod
    refresh-token-expiration: 604800000 # 7 days
